# ============================================================
# MODULE MANIFEST — Pokok.BuildingBlocks.Messaging
# Self-describing structural and semantic metadata.
# See docs/manifest-schema.md for the full schema reference.
# ============================================================

module:
  name: Pokok.BuildingBlocks.Messaging
  namespace: Pokok.BuildingBlocks.Messaging
  purpose: >
    Messaging abstractions and RabbitMQ integration for
    publish/subscribe patterns in distributed systems.
  layer: infrastructure
  patterns:
    - Publish/Subscribe
    - Topic Exchange
    - Background Service (Consumer)
    - Connection Pooling

# ──────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────
dependencies:
  projects: []
  packages:
    - name: RabbitMQ.Client
      purpose: >
        RabbitMQ .NET client for AMQP connection, channel
        management, and message publishing/consuming.
    - name: Microsoft.Extensions.Hosting.Abstractions
      purpose: >
        BackgroundService base class for the message consumer.
    - name: Microsoft.Extensions.Logging.Abstractions
      purpose: >
        Structured logging for connection, publishing, and
        consumption events.
    - name: Microsoft.Extensions.Options
      purpose: >
        IOptions<T> pattern for RabbitMQ configuration.

# ──────────────────────────────────────────────
# PUBLIC API SURFACE
# ──────────────────────────────────────────────
public_api:
  interfaces:
    - name: IMessagePublisher
      purpose: >
        Transport-agnostic message publishing abstraction.
      methods:
        - signature: "Task PublishAsync(string messageType, string payload, CancellationToken cancellationToken)"
          behavior: >
            Publishes a message with the given type (routing
            key) and serialized payload. Throws on failure.

    - name: IRabbitMQConnection
      purpose: >
        Manages RabbitMQ connection lifecycle and channel
        creation.
      methods:
        - signature: "Task<IChannel> CreateChannelAsync()"
          behavior: >
            Returns a new channel from the shared connection.
            Creates the connection lazily on first call.

    - name: "IRabbitMQMessageHandler<T>"
      purpose: >
        Handles deserialized messages of type T from a
        RabbitMQ queue.
      methods:
        - signature: "Task HandleAsync(T message, CancellationToken cancellationToken)"
          behavior: >
            Processes the message. Throwing an exception
            causes an error log but the message is still
            acknowledged.

  classes:
    - name: RabbitMQOptions
      kind: concrete
      purpose: >
        Configuration POCO for RabbitMQ connection settings
        (HostName, Port, UserName, Password).

    - name: RabbitMQConnection
      kind: concrete
      purpose: >
        Default IRabbitMQConnection. Maintains a single
        connection and creates channels on demand.

    - name: RabbitMQMessagePublisher
      kind: concrete
      purpose: >
        IMessagePublisher implementation using RabbitMQ topic
        exchange with persistent, mandatory messages.

    - name: "RabbitMQMessageConsumer<T>"
      kind: concrete
      purpose: >
        BackgroundService that consumes messages from a
        RabbitMQ queue, deserializes to T, and invokes
        IRabbitMQMessageHandler<T>.

  exceptions: []

# ──────────────────────────────────────────────
# BEHAVIORAL CONTRACTS
# ──────────────────────────────────────────────
behavioral_contracts:
  - name: Single shared connection
    description: >
      RabbitMQConnection maintains one TCP connection to the
      broker and creates new channels per operation.
    enforced_by: >
      Lazy connection initialization in CreateChannelAsync.

  - name: Persistent messages
    description: >
      All published messages use DeliveryMode = Persistent,
      surviving broker restarts.
    enforced_by: >
      RabbitMQMessagePublisher sets DeliveryMode.Persistent
      on BasicProperties.

  - name: Mandatory routing
    description: >
      Messages are published with mandatory = true, meaning
      unroutable messages cause exceptions.
    enforced_by: >
      BasicPublishAsync called with mandatory: true.

  - name: Topic exchange pattern
    description: >
      The default exchange name is "pokok.exchange" with type
      Topic. Routing keys correspond to message types.
    enforced_by: >
      Exchange declared as Topic in both publisher and
      consumer.

  - name: JSON serialization
    description: >
      Message payloads are serialized/deserialized as JSON
      with ContentType "application/json".
    enforced_by: >
      Publisher sets ContentType to application/json.
      Consumer deserializes using System.Text.Json.

  - name: Message acknowledged after handling
    description: >
      Messages are acknowledged (ACKed) after the handler
      completes, regardless of success or failure.
    enforced_by: >
      Consumer ACKs in the event handler callback.

# ──────────────────────────────────────────────
# FAILURE MODES
# ──────────────────────────────────────────────
failure_modes:
  - name: Broker unreachable
    trigger: >
      RabbitMQ server is not running or network is down.
    exception: RabbitMQ.Client.Exceptions.BrokerUnreachableException
    impact: >
      Connection cannot be established. Publishing and
      consuming both fail.
    recovery: >
      Ensure the RabbitMQ server is running and accessible.
      Verify HostName, Port, UserName, Password in
      RabbitMQOptions.

  - name: Unroutable message
    trigger: >
      No queue is bound to the exchange with the given
      routing key, and mandatory = true.
    exception: PublishException or callback via BasicReturn
    impact: Message is not delivered.
    recovery: >
      Ensure a consumer with a matching routing key and
      queue binding is running before publishing.

  - name: Deserialization failure
    trigger: >
      Message payload cannot be deserialized to type T.
    exception: JsonException (logged, not thrown to consumer)
    impact: >
      Message is logged as a warning and effectively
      skipped. The message is still acknowledged.
    recovery: >
      Ensure publisher and consumer agree on the message
      schema. Check for version mismatches.

  - name: Handler exception
    trigger: >
      IRabbitMQMessageHandler<T>.HandleAsync throws.
    exception: Any (logged at ERROR level)
    impact: >
      Error is logged but the message is still acknowledged.
      No automatic retry.
    recovery: >
      Fix the handler bug. For retry semantics, consider
      using the Outbox pattern or dead-letter queues.

  - name: Connection dropped
    trigger: >
      Network interruption or broker restart while connected.
    exception: Various RabbitMQ exceptions
    impact: >
      Next channel creation attempt will establish a new
      connection.
    recovery: >
      The connection is re-established lazily. Ensure the
      broker is available.

# ──────────────────────────────────────────────
# RULES OF ENGAGEMENT
# ──────────────────────────────────────────────
rules_of_engagement:
  - rule: >
      Configure RabbitMQOptions via IOptions<RabbitMQOptions>
      in your application settings.
    rationale: >
      The connection uses these options for broker connection.

  - rule: >
      Register IRabbitMQConnection as a singleton.
    rationale: >
      A single connection is shared across the application.
      Creating multiple connections wastes TCP resources.

  - rule: >
      Implement IRabbitMQMessageHandler<T> for each message
      type you consume and register the consumer as a hosted
      service.
    rationale: >
      The consumer runs as a BackgroundService and needs a
      handler to process incoming messages.

  - rule: >
      Use IMessagePublisher (not RabbitMQMessagePublisher
      directly) for publishing.
    rationale: >
      The abstraction allows swapping transports (e.g., for
      testing or switching to a different broker).

  - rule: >
      Ensure consumers are running before publishers send
      messages, or accept that unroutable messages will fail.
    rationale: >
      Mandatory routing causes failures if no queue is bound.

# ──────────────────────────────────────────────
# EXTENSION POINTS
# ──────────────────────────────────────────────
extension_points:
  - name: IMessagePublisher
    type: interface
    description: >
      Implement for alternative transports (Azure Service
      Bus, Kafka, in-memory for testing).

  - name: IRabbitMQConnection
    type: interface
    description: >
      Implement for custom connection management (e.g.,
      connection pooling, SSL configuration).

  - name: "IRabbitMQMessageHandler<T>"
    type: interface
    description: >
      Implement to define message processing logic for each
      consumed message type.
