# ============================================================
# MODULE MANIFEST — Pokok.BuildingBlocks.Domain
# Self-describing structural and semantic metadata.
# See docs/manifest-schema.md for the full schema reference.
# ============================================================

module:
  name: Pokok.BuildingBlocks.Domain
  namespace: Pokok.BuildingBlocks.Domain
  purpose: >
    Core DDD building blocks — AggregateRoot, Entity, ValueObject,
    domain events, and shared-kernel value objects (Email, Money,
    Address, etc.).
  layer: domain
  patterns:
    - Domain-Driven Design
    - Aggregate Root
    - Value Object
    - Domain Events

# ──────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────
dependencies:
  projects: []
  packages: []
  # Intentionally dependency-free. Domain layer must not
  # depend on infrastructure or application concerns.

# ──────────────────────────────────────────────
# PUBLIC API SURFACE
# ──────────────────────────────────────────────
public_api:
  interfaces:
    - name: IAggregateRoot
      purpose: >
        Marker + contract for aggregate roots that collect
        domain events.
      methods:
        - signature: "IReadOnlyCollection<IDomainEvent> DomainEvents { get; }"
          behavior: Returns accumulated domain events since the last clear.
        - signature: "void ClearDomainEvents()"
          behavior: Removes all pending domain events from the aggregate.

    - name: IDomainEvent
      purpose: Represents something that happened in the domain.
      methods:
        - signature: "DateTime OccurredOn { get; }"
          behavior: UTC timestamp of when the event occurred.

    - name: IDomainEventHandler<TDomainEvent>
      purpose: Handles a specific type of domain event.
      methods:
        - signature: "Task Handle(TDomainEvent domainEvent, CancellationToken cancellationToken)"
          behavior: Processes the domain event. May throw to signal failure.

  classes:
    - name: AggregateRoot<TId>
      kind: abstract
      purpose: >
        Base class for aggregate roots. Extends Entity<TId> with
        domain event collection via IAggregateRoot.

    - name: Entity<TId>
      kind: abstract
      purpose: >
        Base class for entities with identity-based equality.

    - name: ValueObject
      kind: abstract
      purpose: >
        Base class for value objects with structural equality.
        Subclasses implement GetEqualityComponents().

    - name: SingleValueObject<T>
      kind: abstract
      purpose: >
        Value object wrapping a single primitive value with
        optional validation.

    - name: EntityId<T>
      kind: abstract
      purpose: >
        Strongly-typed entity identifier extending SingleValueObject.

    - name: DomainEventBase
      kind: abstract
      purpose: >
        Convenience base for domain events. Sets OccurredOn to
        DateTime.UtcNow at construction.

    # Shared Kernel Value Objects
    - name: Email
      kind: sealed
      purpose: Validated email address value object.

    - name: PhoneNumber
      kind: sealed
      purpose: Validated phone number value object.

    - name: PersonName
      kind: sealed
      purpose: First name + last name value object.

    - name: Money
      kind: sealed
      purpose: Amount + currency value object with addition operator.

    - name: Address
      kind: sealed
      purpose: Full postal address value object.

    - name: UserId
      kind: sealed
      purpose: Strongly-typed user identifier.

    - name: DisplayName
      kind: sealed
      purpose: Non-empty display name value object.

    - name: TenantId
      kind: sealed
      purpose: Strongly-typed tenant identifier.

    - name: Url
      kind: sealed
      purpose: Validated absolute URL value object.

    - name: DateTimeRange
      kind: sealed
      purpose: Start/end DateTime range with validation.

    - name: Versioned<T>
      kind: sealed
      purpose: Wraps a value with a version number.

    - name: OutboxMessageType
      kind: sealed
      purpose: >
        Enumeration-style value object for outbox message types
        (Email, Custom).

  exceptions:
    - name: DomainException
      thrown_when: A domain invariant or business rule is violated.
      recovery: >
        Fix the invalid input or state before retrying the
        operation. DomainException messages describe the
        specific invariant that was violated.

# ──────────────────────────────────────────────
# BEHAVIORAL CONTRACTS
# ──────────────────────────────────────────────
behavioral_contracts:
  - name: Value object equality
    description: >
      Two value objects are equal if and only if all their
      equality components are equal. Identity (reference) is
      irrelevant.
    enforced_by: >
      ValueObject.Equals() and operator== compare
      GetEqualityComponents() sequences.

  - name: Entity identity equality
    description: >
      Two entities are equal if and only if their Id values
      are equal, regardless of other property values.
    enforced_by: Entity<TId>.Equals() compares Id only.

  - name: Aggregate event lifecycle
    description: >
      Domain events are added via AddDomainEvent() during
      aggregate operations, then dispatched and cleared by
      the UnitOfWork after persistence.
    enforced_by: >
      AggregateRoot.DomainEvents is read-only. Only
      AddDomainEvent (protected) and ClearDomainEvents
      (public) mutate the collection.

  - name: Value object immutability
    description: >
      Value objects are immutable after construction. All
      validation runs during the constructor.
    enforced_by: >
      Properties have no public setters. Validate() is
      called in the constructor.

  - name: Construction-time validation
    description: >
      Shared kernel value objects validate their inputs during
      construction and throw DomainException if invalid.
    enforced_by: >
      Each value object's constructor calls Validate() which
      throws DomainException on rule violation.

# ──────────────────────────────────────────────
# FAILURE MODES
# ──────────────────────────────────────────────
failure_modes:
  - name: Invalid email format
    trigger: "Constructing Email with a value that doesn't match ^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$"
    exception: DomainException
    impact: Object cannot be created.
    recovery: Provide a valid email address string.

  - name: Invalid phone number format
    trigger: "Constructing PhoneNumber with a value that doesn't match ^\\+?[0-9\\s\\-()]{7,20}$"
    exception: DomainException
    impact: Object cannot be created.
    recovery: Provide a valid phone number string.

  - name: Negative money amount
    trigger: Constructing Money with a negative Amount value.
    exception: DomainException
    impact: Object cannot be created.
    recovery: Provide a non-negative decimal amount.

  - name: Currency mismatch on Money addition
    trigger: Adding two Money instances with different Currency values.
    exception: DomainException
    impact: Operation is rejected.
    recovery: Ensure both operands use the same currency code.

  - name: Null or empty required fields
    trigger: >
      Constructing PersonName, Address, DisplayName, TenantId,
      or UserId with null or whitespace values.
    exception: DomainException or ArgumentNullException
    impact: Object cannot be created.
    recovery: Provide non-empty values for all required fields.

  - name: Invalid DateTimeRange
    trigger: Constructing DateTimeRange where Start >= End.
    exception: DomainException
    impact: Object cannot be created.
    recovery: Ensure Start is strictly before End.

  - name: Invalid URL
    trigger: Constructing Url with a non-absolute URI string.
    exception: DomainException
    impact: Object cannot be created.
    recovery: Provide a valid absolute URL (e.g., https://example.com).

  - name: Null SingleValueObject value
    trigger: Constructing any SingleValueObject<T> with a null value.
    exception: ArgumentNullException
    impact: Object cannot be created.
    recovery: Provide a non-null value.

# ──────────────────────────────────────────────
# RULES OF ENGAGEMENT
# ──────────────────────────────────────────────
rules_of_engagement:
  - rule: >
      Inherit from ValueObject (or SingleValueObject<T>) for
      types defined by their attributes, not identity.
    rationale: >
      Ensures correct equality semantics and immutability.

  - rule: >
      Inherit from Entity<TId> for types with a distinct identity
      that persists across state changes.
    rationale: >
      Identity-based equality prevents duplicate tracking in
      collections and ORMs.

  - rule: >
      Inherit from AggregateRoot<TId> for the root entity of
      each consistency boundary.
    rationale: >
      Aggregates are the transactional boundary in DDD. Only
      aggregate roots should be directly persisted and loaded.

  - rule: >
      Raise domain events via AddDomainEvent() inside aggregate
      methods — never from outside the aggregate.
    rationale: >
      Events represent facts about domain state transitions.
      Only the aggregate that owns the state should decide
      when events occur.

  - rule: >
      Throw DomainException for business rule violations;
      do not use generic exceptions.
    rationale: >
      DomainException signals a domain-level problem that the
      caller can handle distinctly from infrastructure errors.

  - rule: >
      Do not add infrastructure dependencies (EF Core, HTTP,
      messaging) to this module.
    rationale: >
      The domain layer must remain pure and portable across
      hosting environments.

# ──────────────────────────────────────────────
# EXTENSION POINTS
# ──────────────────────────────────────────────
extension_points:
  - name: ValueObject
    type: abstract-class
    description: >
      Extend to create custom value objects. Override
      GetEqualityComponents() and optionally Validate().

  - name: AggregateRoot<TId>
    type: abstract-class
    description: >
      Extend to create aggregate root entities with event
      sourcing capability.

  - name: IDomainEventHandler<TDomainEvent>
    type: interface
    description: >
      Implement to handle specific domain event types.
      Register in DI; dispatched by the CQRS module.

  - name: DomainEventBase
    type: abstract-class
    description: >
      Extend to define new domain event types with the
      OccurredOn timestamp automatically set.
