# ============================================================
# MODULE MANIFEST — Pokok.BuildingBlocks.Persistence
# Self-describing structural and semantic metadata.
# See docs/manifest-schema.md for the full schema reference.
# ============================================================

module:
  name: Pokok.BuildingBlocks.Persistence
  namespace: Pokok.BuildingBlocks.Persistence
  purpose: >
    EF Core abstractions for repository pattern, Unit of Work,
    specification pattern, automatic auditing, and soft delete.
  layer: infrastructure
  patterns:
    - Repository
    - Unit of Work
    - Specification
    - Soft Delete
    - Audit Trail

# ──────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────
dependencies:
  projects:
    - name: Pokok.BuildingBlocks.Common
      relationship: >
        Uses ICurrentUserService to populate audit trail
        fields (CreatedBy, ModifiedBy).
    - name: Pokok.BuildingBlocks.Cqrs
      relationship: >
        Uses IDomainEventDispatcher to dispatch domain events
        after SaveChanges in the UnitOfWork.
  packages:
    - name: Microsoft.EntityFrameworkCore
      purpose: >
        Core ORM framework for repository implementations,
        DbContext base, and change tracking.
    - name: Microsoft.EntityFrameworkCore.Abstractions
      purpose: >
        Lightweight abstractions used by entity configurations.
    - name: Microsoft.EntityFrameworkCore.Tools
      purpose: >
        Design-time tooling for EF Core migrations.

# ──────────────────────────────────────────────
# PUBLIC API SURFACE
# ──────────────────────────────────────────────
public_api:
  interfaces:
    - name: IEntity
      purpose: Marker interface for persistable entities with GUID Id.
      methods:
        - signature: "Guid Id { get; }"
          behavior: Returns the entity's unique identifier.

    - name: IAuditable
      purpose: >
        Marks entities for automatic audit trail population
        (created/modified timestamps and user IDs).
      methods:
        - signature: "DateTime CreatedAtUtc { get; set; }"
          behavior: Set automatically on insert.
        - signature: "string? CreatedBy { get; set; }"
          behavior: Set to current user on insert (or "system").
        - signature: "DateTime? ModifiedAtUtc { get; set; }"
          behavior: Set automatically on update.
        - signature: "string? ModifiedBy { get; set; }"
          behavior: Set to current user on update.

    - name: ISoftDeletable
      purpose: >
        Marks entities for soft delete. Hard deletes are
        automatically converted to soft deletes.
      methods:
        - signature: "bool IsDeleted { get; set; }"
          behavior: Set to true when entity is deleted.
        - signature: "DateTime? DeletedAtUtc { get; set; }"
          behavior: Set to current UTC time on soft delete.
        - signature: "string? DeletedBy { get; set; }"
          behavior: Set to current user on soft delete.

    - name: IRepository<T>
      purpose: Generic repository interface for CRUD operations.
      methods:
        - signature: "Task<T?> GetAsync(Guid id, CancellationToken ct)"
          behavior: Returns entity by ID, or null if not found.
        - signature: "Task<IEnumerable<T>> GetAllAsync(CancellationToken ct)"
          behavior: Returns all entities of type T.
        - signature: "Task<IEnumerable<T>> FindAsync(Expression<Func<T, bool>> predicate, CancellationToken ct)"
          behavior: Returns entities matching the predicate.
        - signature: "Task AddAsync(T entity, CancellationToken ct)"
          behavior: Adds entity to the change tracker (not yet persisted).
        - signature: "void Remove(T entity)"
          behavior: Marks entity for deletion (soft or hard based on ISoftDeletable).
        - signature: "Task<bool> ExistsAsync(Expression<Func<T, bool>> predicate, CancellationToken ct)"
          behavior: Returns true if any entity matches.
        - signature: "Task<int> CountAsync(Expression<Func<T, bool>> predicate, CancellationToken ct)"
          behavior: Returns count of matching entities.

    - name: IUnitOfWork
      purpose: >
        Atomically saves changes and dispatches domain events.
      methods:
        - signature: "Task<int> CompleteAsync(CancellationToken ct)"
          behavior: >
            Saves all pending changes, extracts domain events
            from IAggregateRoot entities, clears events, then
            dispatches them via IDomainEventDispatcher.
            Returns row count.

    - name: ISpecification<T>
      purpose: Encapsulates reusable query criteria as objects.
      methods:
        - signature: "Expression<Func<T, bool>> ToExpression()"
          behavior: Returns the LINQ expression for this specification.

  classes:
    - name: EntityBase
      kind: abstract
      purpose: >
        Convenience base implementing IEntity, IAuditable,
        and ISoftDeletable with auto-generated GUID Id.

    - name: DbContextBase
      kind: abstract
      purpose: >
        Base DbContext that intercepts SaveChanges to
        automatically populate audit and soft delete fields.

    - name: RepositoryBase<T>
      kind: abstract
      purpose: >
        Generic repository implementation backed by DbContext.

    - name: "UnitOfWork<TContext>"
      kind: concrete
      purpose: >
        Default IUnitOfWork implementation. Saves changes
        and dispatches domain events.

    - name: BaseSpecification<T>
      kind: abstract
      purpose: >
        Base specification with criteria, optional paging.

    - name: PaginatedSpecification<T>
      kind: abstract
      purpose: >
        Specification with built-in pagination (page number
        and page size validation).

    - name: "AndSpecification<T>"
      kind: concrete
      purpose: Combines two specifications with logical AND.

    - name: "OrSpecification<T>"
      kind: concrete
      purpose: Combines two specifications with logical OR.

    - name: "NotSpecification<T>"
      kind: concrete
      purpose: Negates a specification.

    - name: "SpecificationEvaluator<T>"
      kind: concrete
      purpose: Applies specifications to IQueryable<T>.

    - name: ModelBuilderExtensions
      kind: static
      purpose: >
        EF Core model builder extensions for global soft
        delete query filters and UTC DateTime conversion.

    - name: UtcDateTimeConverter
      kind: sealed
      purpose: >
        EF Core ValueConverter that normalizes DateTime
        values to UTC on read/write.

  exceptions: []

# ──────────────────────────────────────────────
# BEHAVIORAL CONTRACTS
# ──────────────────────────────────────────────
behavioral_contracts:
  - name: Repository changes are not persisted until CompleteAsync
    description: >
      All Add, Remove, and modification operations are queued
      in the EF Core change tracker. Nothing is written to the
      database until IUnitOfWork.CompleteAsync() is called.
    enforced_by: >
      RepositoryBase operates on DbSet without calling
      SaveChanges. UnitOfWork.CompleteAsync calls SaveChanges.

  - name: Automatic audit trail
    description: >
      Any entity implementing IAuditable will have its
      CreatedAtUtc, CreatedBy, ModifiedAtUtc, and ModifiedBy
      fields automatically populated during SaveChanges.
    enforced_by: >
      DbContextBase.SaveChangesAsync intercepts change
      tracker entries and sets values based on entity state.

  - name: Hard deletes converted to soft deletes
    description: >
      If an entity implements ISoftDeletable, deleting it
      does not remove the row. Instead, IsDeleted is set to
      true and the entity state is changed to Modified.
    enforced_by: >
      DbContextBase.SaveChangesAsync intercepts Deleted
      entries for ISoftDeletable and converts them.

  - name: Soft-deleted entities excluded from queries
    description: >
      Entities marked as ISoftDeletable with IsDeleted = true
      are automatically filtered out of all queries.
    enforced_by: >
      ModelBuilderExtensions.ApplyGlobalConfigurations adds
      a global query filter (IsDeleted == false).

  - name: All DateTimes stored as UTC
    description: >
      DateTime properties are normalized to DateTimeKind.Utc
      on both read and write.
    enforced_by: >
      UtcDateTimeConverter is applied to all DateTime
      properties via ApplyGlobalConfigurations.

  - name: Domain events dispatched after persistence
    description: >
      Domain events are extracted from aggregates and
      dispatched AFTER the database transaction commits.
    enforced_by: >
      UnitOfWork.CompleteAsync calls SaveChanges first,
      then extracts and dispatches events.

# ──────────────────────────────────────────────
# FAILURE MODES
# ──────────────────────────────────────────────
failure_modes:
  - name: Missing ICurrentUserService
    trigger: >
      ICurrentUserService is not registered in DI when
      DbContextBase is used.
    exception: InvalidOperationException (from DI)
    impact: >
      Audit fields cannot be populated. SaveChanges may fail
      or default to "system".
    recovery: >
      Register an ICurrentUserService implementation.

  - name: Concurrency conflict
    trigger: >
      Two concurrent updates modify the same entity.
    exception: DbUpdateConcurrencyException
    impact: The second save fails.
    recovery: >
      Reload the entity, reapply changes, and retry.
      Consider implementing optimistic concurrency tokens.

  - name: Invalid pagination parameters
    trigger: >
      PaginatedSpecification constructed with pageNumber <= 0
      or pageSize <= 0.
    exception: ArgumentOutOfRangeException
    impact: Specification cannot be created.
    recovery: >
      Use positive integers for pageNumber and pageSize.

  - name: Domain event dispatch failure
    trigger: >
      A domain event handler throws during UnitOfWork
      dispatch.
    exception: Any (propagated from handler)
    impact: >
      Database changes are already committed. Event
      processing is partially complete.
    recovery: >
      Design event handlers to be idempotent. Consider
      the Outbox pattern for guaranteed delivery.

# ──────────────────────────────────────────────
# RULES OF ENGAGEMENT
# ──────────────────────────────────────────────
rules_of_engagement:
  - rule: >
      Always call IUnitOfWork.CompleteAsync() to persist
      repository changes.
    rationale: >
      Repository operations only modify the change tracker.
      Without CompleteAsync, nothing is saved.

  - rule: >
      Inherit from DbContextBase (not DbContext) for your
      application DbContext.
    rationale: >
      DbContextBase provides automatic audit trail and soft
      delete interception.

  - rule: >
      Call modelBuilder.ApplyGlobalConfigurations() in
      OnModelCreating.
    rationale: >
      Enables global soft delete filters and UTC DateTime
      conversion for all entities.

  - rule: >
      Use IRepository<T> for data access — avoid exposing
      DbContext or DbSet directly.
    rationale: >
      The repository abstraction provides a testable seam
      and enforces the Unit of Work pattern.

  - rule: >
      Implement IAuditable on entities that need audit trails.
      Implement ISoftDeletable on entities that should not be
      hard-deleted.
    rationale: >
      These marker interfaces trigger automatic behavior in
      DbContextBase.SaveChangesAsync.

# ──────────────────────────────────────────────
# EXTENSION POINTS
# ──────────────────────────────────────────────
extension_points:
  - name: RepositoryBase<T>
    type: abstract-class
    description: >
      Inherit to create type-specific repositories with
      custom query methods beyond the generic CRUD.

  - name: DbContextBase
    type: abstract-class
    description: >
      Inherit to create application-specific DbContexts with
      automatic audit and soft delete support.

  - name: BaseSpecification<T>
    type: abstract-class
    description: >
      Extend to create reusable, composable query
      specifications.

  - name: ISpecification<T>
    type: interface
    description: >
      Implement for custom specification patterns beyond the
      provided base classes.
