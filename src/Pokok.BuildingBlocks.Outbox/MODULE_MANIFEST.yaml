# ============================================================
# MODULE MANIFEST — Pokok.BuildingBlocks.Outbox
# Self-describing structural and semantic metadata.
# See docs/manifest-schema.md for the full schema reference.
# ============================================================

module:
  name: Pokok.BuildingBlocks.Outbox
  namespace: Pokok.BuildingBlocks.Outbox
  purpose: >
    Outbox pattern implementation for reliable, at-least-once
    message delivery in distributed systems. Ensures database
    writes and outgoing messages are eventually consistent.
  layer: infrastructure
  patterns:
    - Transactional Outbox
    - Background Processor
    - At-Least-Once Delivery
    - Polling Publisher

# ──────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────
dependencies:
  projects:
    - name: Pokok.BuildingBlocks.Domain
      relationship: >
        Uses OutboxMessageType value object from the Domain
        shared kernel.
    - name: Pokok.BuildingBlocks.Messaging
      relationship: >
        Uses IMessagePublisher to send outbox messages to the
        message broker (e.g., RabbitMQ).
  packages:
    - name: Microsoft.EntityFrameworkCore
      purpose: >
        OutboxDbContext and EF Core queries for persisting
        and retrieving outbox messages.
    - name: Microsoft.EntityFrameworkCore.Tools
      purpose: >
        Design-time tooling for outbox table migrations.
    - name: Microsoft.Extensions.Hosting
      purpose: >
        BackgroundService base for the outbox processor
        hosted service.

# ──────────────────────────────────────────────
# PUBLIC API SURFACE
# ──────────────────────────────────────────────
public_api:
  interfaces:
    - name: IOutboxMessageRepository
      purpose: >
        Data access for outbox messages — add, query
        unprocessed, mark as processed or failed.
      methods:
        - signature: "Task AddAsync(OutboxMessage message, CancellationToken ct)"
          behavior: Adds a new outbox message to the store.
        - signature: "Task<List<OutboxMessage>> GetUnprocessedMessagesAsync(int maxCount, CancellationToken ct)"
          behavior: >
            Returns up to maxCount unprocessed messages
            ordered by creation time.
        - signature: "Task MarkAsProcessedAsync(Guid id, CancellationToken ct)"
          behavior: >
            Sets ProcessedOnUtc to now. Message will not be
            picked up again.
        - signature: "Task MarkAsFailedAsync(Guid id, string error, CancellationToken ct)"
          behavior: >
            Records the error message. Message remains
            unprocessed for retry.
        - signature: "Task CompleteAsync(CancellationToken ct)"
          behavior: >
            Saves all pending changes to the database.

  classes:
    - name: OutboxMessage
      kind: concrete
      purpose: >
        Represents a message in the outbox table. Tracks
        type, payload, source, processing status, and errors.

    - name: OutboxOptions
      kind: concrete
      purpose: >
        Configuration for the outbox processor. Controls
        the polling interval (default: 10 seconds).

    - name: OutboxDbContext
      kind: concrete
      purpose: >
        EF Core DbContext for the OutboxMessages table with
        column configuration and type conversion.

    - name: OutboxMessageRepository
      kind: concrete
      purpose: >
        Default IOutboxMessageRepository using EF Core.

    - name: "OutboxProcessorHostedService<TDbContext>"
      kind: concrete
      purpose: >
        BackgroundService that polls for unprocessed messages,
        publishes them via IMessagePublisher, and marks them
        as processed or failed.

    - name: ServiceCollectionExtensions
      kind: static
      purpose: >
        Extension method AddOutboxProcessor<TDbContext>()
        for DI registration.

  exceptions: []

# ──────────────────────────────────────────────
# BEHAVIORAL CONTRACTS
# ──────────────────────────────────────────────
behavioral_contracts:
  - name: At-least-once delivery
    description: >
      Messages are guaranteed to be published at least once.
      Failed messages remain unprocessed and are retried on
      the next polling cycle.
    enforced_by: >
      MarkAsProcessed is only called after successful
      publishing. Failed messages retain null ProcessedOnUtc.

  - name: Polling-based processing
    description: >
      The processor polls the database every
      OutboxOptions.Interval (default 10 seconds) for up to
      10 unprocessed messages per batch.
    enforced_by: >
      OutboxProcessorHostedService loop with Task.Delay.

  - name: Outbox message state machine
    description: >
      Messages transition through states: New (ProcessedOnUtc
      = null, Error = null) → Processed (ProcessedOnUtc set)
      or Failed (Error set, ProcessedOnUtc = null). Failed
      messages remain eligible for retry.
    enforced_by: >
      OutboxMessage.MarkAsProcessed() and MarkAsFailed()
      methods manage state transitions.

  - name: Atomic write with business data
    description: >
      Outbox messages should be written in the same database
      transaction as business data changes. This ensures
      consistency between state changes and outgoing messages.
    enforced_by: >
      Convention — consumers must add OutboxMessage to the
      same DbContext/transaction as their business entities.

# ──────────────────────────────────────────────
# FAILURE MODES
# ──────────────────────────────────────────────
failure_modes:
  - name: Message publishing failure
    trigger: >
      IMessagePublisher.PublishAsync throws (e.g., broker
      unreachable).
    exception: Any (caught and logged)
    impact: >
      Message is marked as failed with the error message.
      It remains unprocessed and will be retried.
    recovery: >
      Fix the underlying broker issue. The processor will
      retry on the next polling cycle.

  - name: Database unavailable
    trigger: >
      The outbox database is unreachable during polling.
    exception: DbException or similar
    impact: >
      The processor logs the error and waits for the next
      interval before retrying.
    recovery: >
      Restore database connectivity. The processor
      self-heals on the next cycle.

  - name: Duplicate message delivery
    trigger: >
      The processor publishes a message but crashes before
      marking it as processed.
    exception: None
    impact: >
      The message will be published again on the next cycle.
    recovery: >
      Design consumers to be idempotent. Use message IDs
      for deduplication.

  - name: Poison message
    trigger: >
      A message repeatedly fails to publish (e.g., invalid
      payload).
    exception: Repeated publish exceptions
    impact: >
      The message is retried indefinitely on each polling
      cycle, consuming resources.
    recovery: >
      Monitor the Error field. Implement a max-retry or
      dead-letter mechanism in your application.

# ──────────────────────────────────────────────
# RULES OF ENGAGEMENT
# ──────────────────────────────────────────────
rules_of_engagement:
  - rule: >
      Add OutboxMessage entities to the same DbContext and
      transaction as your business entity changes.
    rationale: >
      This ensures atomicity — either both the business
      change and the outbox message are saved, or neither is.

  - rule: >
      Design message consumers to be idempotent.
    rationale: >
      At-least-once delivery means messages may be delivered
      more than once after failures.

  - rule: >
      Register the outbox processor via
      AddOutboxProcessor<TDbContext>().
    rationale: >
      This registers both the repository and the hosted
      service that polls and publishes messages.

  - rule: >
      Configure OutboxOptions.Interval based on your
      latency requirements.
    rationale: >
      Shorter intervals reduce delivery latency but increase
      database polling load. Default is 10 seconds.

  - rule: >
      Monitor the Error field on OutboxMessage for stuck or
      repeatedly failing messages.
    rationale: >
      Without monitoring, poison messages silently consume
      processing resources each cycle.

# ──────────────────────────────────────────────
# EXTENSION POINTS
# ──────────────────────────────────────────────
extension_points:
  - name: IOutboxMessageRepository
    type: interface
    description: >
      Replace the default EF Core implementation with a
      custom data store (e.g., Dapper, raw SQL, NoSQL).

  - name: OutboxDbContext
    type: abstract-class
    description: >
      Extend to add the outbox table to an existing
      application DbContext.

# ──────────────────────────────────────────────
# SERVICE REGISTRATION
# ──────────────────────────────────────────────
service_registration:
  entry_point: ServiceCollectionExtensions.AddOutboxProcessor<TDbContext>()
  example: |
    services.AddOutboxProcessor<AppDbContext>();
    services.Configure<OutboxOptions>(o => o.Interval = TimeSpan.FromSeconds(5));
  registered_services:
    - interface: IOutboxMessageRepository
      implementation: OutboxMessageRepository
      lifetime: scoped

    - interface: IHostedService
      implementation: "OutboxProcessorHostedService<TDbContext>"
      lifetime: singleton
