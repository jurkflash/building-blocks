# ============================================================
# MODULE MANIFEST — Pokok.Messaging.Email
# Self-describing structural and semantic metadata.
# See docs/manifest-schema.md for the full schema reference.
# ============================================================

module:
  name: Pokok.Messaging.Email
  namespace: Pokok.Messaging.Email
  purpose: >
    Email messaging utilities with an extensible template
    rendering system using placeholder-based substitution.
  layer: infrastructure
  patterns:
    - Template Method
    - Placeholder Substitution
    - Options Pattern

# ──────────────────────────────────────────────
# DEPENDENCIES
# ──────────────────────────────────────────────
dependencies:
  projects: []
  packages:
    - name: Microsoft.Extensions.Logging.Abstractions
      purpose: >
        Logging for template rendering diagnostics (e.g.,
        missing placeholder warnings).
    - name: Microsoft.Extensions.Options
      purpose: >
        IOptions<T> support for loading email templates from
        configuration (appsettings.json).

# ──────────────────────────────────────────────
# PUBLIC API SURFACE
# ──────────────────────────────────────────────
public_api:
  interfaces:
    - name: ITemplateRenderer
      purpose: >
        Renders email templates by replacing placeholders
        with model property values.
      methods:
        - signature: "(string Subject, string Body) Render(EmailTemplateOptions template, object model)"
          behavior: >
            Iterates model properties via reflection. Replaces
            {PropertyName} placeholders in Subject and Body.
            Returns a tuple of the rendered strings. Missing
            properties are logged but do not cause failures.

  classes:
    - name: EmailTemplateOptions
      kind: abstract
      purpose: >
        Base class for email templates. Consumers inherit to
        define Subject and Body with {placeholder} syntax.

    - name: EmailDispatchMessage
      kind: concrete
      purpose: >
        Represents a fully composed email message with
        recipients (To, Cc, Bcc), Subject, Body, and
        HTML flag.

    - name: SimpleTemplateRenderer
      kind: concrete
      purpose: >
        Default ITemplateRenderer using reflection-based
        placeholder replacement with {PropertyName} syntax.

  exceptions: []

# ──────────────────────────────────────────────
# BEHAVIORAL CONTRACTS
# ──────────────────────────────────────────────
behavioral_contracts:
  - name: Placeholder syntax
    description: >
      Placeholders use the format {PropertyName} where
      PropertyName matches a public property on the model
      object (case-sensitive).
    enforced_by: >
      SimpleTemplateRenderer uses reflection to enumerate
      model properties and replaces matching {Name} tokens.

  - name: Lenient rendering
    description: >
      Missing placeholders (no matching model property) are
      left in the output string as-is. They are logged at
      DEBUG level but do not throw exceptions.
    enforced_by: >
      SimpleTemplateRenderer only replaces placeholders
      that have a matching property. Unmatched placeholders
      remain in the template string.

  - name: HTML by default
    description: >
      EmailDispatchMessage.IsHtml defaults to true, meaning
      the Body is treated as HTML content.
    enforced_by: >
      IsHtml property default value is true.

  - name: No predefined templates
    description: >
      This module provides the rendering engine only.
      Templates are defined by the consuming application.
    enforced_by: >
      EmailTemplateOptions is abstract — consumers must
      create concrete template classes.

# ──────────────────────────────────────────────
# FAILURE MODES
# ──────────────────────────────────────────────
failure_modes:
  - name: Null template
    trigger: >
      Passing a null EmailTemplateOptions to Render().
    exception: ArgumentNullException or NullReferenceException
    impact: Rendering fails.
    recovery: Provide a non-null template instance.

  - name: Null model
    trigger: >
      Passing a null model to Render().
    exception: ArgumentNullException or NullReferenceException
    impact: No placeholders are replaced.
    recovery: Provide a non-null model object.

  - name: Unmatched placeholders
    trigger: >
      Template contains {Placeholder} tokens that have no
      corresponding property on the model object.
    exception: None (graceful degradation)
    impact: >
      The raw {Placeholder} text appears in the rendered
      output. Logged at DEBUG level.
    recovery: >
      Ensure the model object has properties matching all
      placeholders in the template.

  - name: Property type not convertible to string
    trigger: >
      A model property value cannot be meaningfully
      converted to a string representation.
    exception: None (uses ToString())
    impact: >
      The placeholder is replaced with the default
      ToString() output, which may not be human-readable.
    recovery: >
      Override ToString() on complex types or use string
      properties on the model.

# ──────────────────────────────────────────────
# RULES OF ENGAGEMENT
# ──────────────────────────────────────────────
rules_of_engagement:
  - rule: >
      Create concrete classes inheriting EmailTemplateOptions
      for each email template in your application.
    rationale: >
      Templates are application-specific. The module provides
      the rendering infrastructure only.

  - rule: >
      Register ITemplateRenderer as scoped or singleton in
      your DI container.
    rationale: >
      SimpleTemplateRenderer is stateless and can be shared.

  - rule: >
      Use {PropertyName} placeholders in Subject and Body
      that match model property names exactly (case-sensitive).
    rationale: >
      The renderer uses reflection to match property names
      to placeholders.

  - rule: >
      Optionally bind templates from configuration using
      IOptions<T>.
    rationale: >
      This enables template changes without recompilation.

  - rule: >
      This module does NOT send emails. It only composes
      EmailDispatchMessage objects. Use the Outbox or
      Messaging module to deliver them.
    rationale: >
      Separation of concerns — rendering and delivery are
      independent.

# ──────────────────────────────────────────────
# EXTENSION POINTS
# ──────────────────────────────────────────────
extension_points:
  - name: ITemplateRenderer
    type: interface
    description: >
      Replace SimpleTemplateRenderer with a more advanced
      engine (Razor, Scriban, Handlebars) for rich template
      features.

  - name: EmailTemplateOptions
    type: abstract-class
    description: >
      Inherit to define application-specific email templates
      with Subject and Body placeholders.
